<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020008"/>
      <stop offset="50%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#020008"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#0ACF83"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(240,235,248,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow -->
  <ellipse cx="600" cy="315" rx="400" ry="250" fill="rgba(0,240,255,0.04)"/>
  <!-- Top line -->
  <rect x="100" y="180" width="80" height="2" fill="#00F0FF" opacity="0.6"/>
  <!-- Label -->
  <text x="195" y="188" font-family="monospace" font-size="14" fill="#00F0FF" letter-spacing="3" opacity="0.8">AUTONOMOUS AI PLATFORM</text>
  <!-- 4 -->
  <text x="100" y="320" font-family="sans-serif" font-size="140" font-weight="800" fill="#00F0FF">4</text>
  <!-- 20 -->
  <text x="210" y="320" font-family="sans-serif" font-size="140" font-weight="800" fill="#0ACF83">20</text>
  <!-- SYSTEM -->
  <text x="470" y="320" font-family="sans-serif" font-size="140" font-weight="800" fill="#F0EBF8">SYSTEM</text>
  <!-- Tagline -->
  <text x="100" y="390" font-family="sans-serif" font-size="28" fill="rgba(240,235,248,0.55)">Sales. Marketing. HR. Operations.</text>
  <!-- Sub tagline -->
  <text x="100" y="430" font-family="sans-serif" font-size="28" fill="rgba(240,235,248,0.55)">One intelligent organism.</text>
  <!-- Bottom accent line -->
  <rect x="100" y="480" width="1000" height="1" fill="url(#accent)" opacity="0.3"/>
  <!-- Domain -->
  <text x="100" y="530" font-family="monospace" font-size="16" fill="rgba(240,235,248,0.35)" letter-spacing="2">zatesystems.com</text>
</svg>